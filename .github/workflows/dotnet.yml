name: .NET Framework CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '17.0'
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'
    
    - name: Restore NuGet packages
      run: nuget restore PLCServer.csproj
    
    - name: Build
      run: msbuild PLCServer.csproj /p:Configuration=Release /p:Platform=AnyCPU
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PLCServer-Release
        path: bin/Release
